services:
  - type: web
    name: vaizai-scm-backend
    runtime: docker
    plan: free
    region: oregon
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: vaizai-scm-db
          property: connectionString

databases:
  - name: vaizai-scm-db
    plan: free
    region: oregon
